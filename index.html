<!DOCTYP<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K&K Industries Weekly Snapshot</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      background: #ffffff;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title h1 {
      margin: 0 0 6px 0;
      font-size: 28px;
      line-height: 1.1;
    }

    .title p {
      margin: 0;
      color: #6b7280;
      font-size: 14px;
    }

    .controls {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search {
      flex: 1 1 280px;
    }

    .search input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 15px;
      background: #fff;
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      border: none;
      background: #e5e7eb;
      color: #111827;
      padding: 12px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
    }

    .filter-btn.active {
      background: #111827;
      color: #ffffff;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .kpi-card {
      background: #ffffff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .kpi-label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    .kpi-value {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
    }

    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .job-card {
      background: #ffffff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .job-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .job-name {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.red {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge.amber {
      background: #fef3c7;
      color: #92400e;
    }

    .badge.green {
      background: #dcfce7;
      color: #166534;
    }

    .badge.gray {
      background: #e5e7eb;
      color: #374151;
    }

    .job-row {
      margin-bottom: 12px;
    }

    .job-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #6b7280;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .job-value {
      font-size: 15px;
      line-height: 1.5;
    }

    .empty-state {
      background: #ffffff;
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      color: #6b7280;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    @media (max-width: 900px) {
      .kpis {
        grid-template-columns: repeat(2, 1fr);
      }

      .jobs-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .wrap {
        padding: 14px;
      }

      .header,
      .kpi-card,
      .job-card,
      .empty-state {
        border-radius: 14px;
      }

      .title h1 {
        font-size: 24px;
      }

      .kpi-value {
        font-size: 26px;
      }

      .controls {
        flex-direction: column;
      }

      .filters {
        width: 100%;
      }

      .filter-btn {
        flex: 1 1 auto;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="header-top">
        <div class="title">
          <h1 id="companyName"></h1>
          <p>
            Week Ending: <span id="weekEnding"></span><br>
            Last Updated: <span id="lastUpdated"></span>
          </p>
        </div>
      </div>

      <div class="controls">
        <div class="search">
          <input type="text" id="searchInput" placeholder="Search job name..." />
        </div>

        <div class="filters">
          <button class="filter-btn active" data-filter="All">All</button>
          <button class="filter-btn" data-filter="At Risk">At Risk</button>
          <button class="filter-btn" data-filter="Monitor">Monitor</button>
          <button class="filter-btn" data-filter="On Track">On Track</button>
          <button class="filter-btn" data-filter="Unknown">Unknown</button>
        </div>
      </div>
    </div>

    <div class="kpis">
      <div class="kpi-card">
        <div class="kpi-label">Total Jobs</div>
        <div class="kpi-value" id="totalJobs"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">At Risk</div>
        <div class="kpi-value" id="atRisk"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">On Track</div>
        <div class="kpi-value" id="onTrack"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Blind Spots</div>
        <div class="kpi-value" id="blindSpots"></div>
      </div>
    </div>

    <div id="jobsContainer" class="jobs-grid"></div>
  </div>

  <script src="data.js"></script>
  <script>
    const companyNameEl = document.getElementById("companyName");
    const weekEndingEl = document.getElementById("weekEnding");
    const lastUpdatedEl = document.getElementById("lastUpdated");
    const totalJobsEl = document.getElementById("totalJobs");
    const atRiskEl = document.getElementById("atRisk");
    const onTrackEl = document.getElementById("onTrack");
    const blindSpotsEl = document.getElementById("blindSpots");
    const jobsContainer = document.getElementById("jobsContainer");
    const searchInput = document.getElementById("searchInput");
    const filterButtons = document.querySelectorAll(".filter-btn");

    let currentFilter = "All";

    function getBadgeClass(status) {
      const s = status.toLowerCase();

      if (s.includes("risk") || s.includes("behind")) return "red";
      if (s.includes("monitor")) return "amber";
      if (s.includes("track")) return "green";
      return "gray";
    }

    function renderHeader() {
      companyNameEl.textContent = snapshotData.company;
      weekEndingEl.textContent = snapshotData.weekEnding;
      lastUpdatedEl.textContent = snapshotData.lastUpdated;

      totalJobsEl.textContent = snapshotData.kpis.totalJobs;
      atRiskEl.textContent = snapshotData.kpis.atRisk;
      onTrackEl.textContent = snapshotData.kpis.onTrack;
      blindSpotsEl.textContent = snapshotData.kpis.blindSpots;
    }

    function renderJobs() {
      const searchTerm = searchInput.value.trim().toLowerCase();

      const filteredJobs = snapshotData.jobs.filter(job => {
        const matchesSearch = job.name.toLowerCase().includes(searchTerm);
        const matchesFilter = currentFilter === "All" || job.status === currentFilter;
        return matchesSearch && matchesFilter;
      });

      if (filteredJobs.length === 0) {
        jobsContainer.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            No jobs match your search or filter.
          </div>
        `;
        return;
      }

      jobsContainer.innerHTML = filteredJobs.map(job => `
        <div class="job-card">
          <div class="job-head">
            <h2 class="job-name">${job.name}</h2>
            <span class="badge ${getBadgeClass(job.status)}">${job.status}</span>
          </div>

          <div class="job-row">
            <div class="job-label">Holding Up</div>
            <div class="job-value">${job.holdingUp}</div>
          </div>

          <div class="job-row">
            <div class="job-label">Labour</div>
            <div class="job-value">${job.labour}</div>
          </div>

          <div class="job-row">
            <div class="job-label">Reality</div>
            <div class="job-value">${job.reality}</div>
          </div>

          <div class="job-row">
            <div class="job-label">Next Action</div>
            <div class="job-value">${job.nextAction}</div>
          </div>
        </div>
      `).join("");
    }

    searchInput.addEventListener("input", renderJobs);

    filterButtons.forEach(button => {
      button.addEventListener("click", () => {
        filterButtons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        currentFilter = button.dataset.filter;
        renderJobs();
      });
    });

    renderHeader();
    renderJobs();
  </script>
</body>
</html>
