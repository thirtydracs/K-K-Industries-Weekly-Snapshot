<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K&K Industries Weekly Snapshot</title>
  <style>
    :root {
      --bg:             #f0ede8;
      --surface:        #ffffff;
      --text:           #1a1a1a;
      --muted:          #888073;
      --border:         #e0dbd3;

      --risk-card-bg:   #fff5f5;
      --risk-accent:    #dc2626;
      --monitor-card-bg:#fffbeb;
      --monitor-accent: #d97706;
      --track-card-bg:  #f0fdf4;
      --track-accent:   #16a34a;
      --unk-card-bg:    #f9f9f9;
      --unk-accent:     #9ca3af;

      --r: 14px;
      --shadow: 0 2px 10px rgba(0,0,0,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap { max-width: 1200px; margin: 0 auto; padding: 20px 16px 48px; }

    /* Header */
    .header {
      background: #1c1c1e;
      border-radius: var(--r);
      padding: 24px 24px 20px;
      margin-bottom: 14px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
    }

    .company-name {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .header-meta { text-align: right; }
    .meta-item { margin-bottom: 6px; }
    .meta-label { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; }
    .meta-value { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.8); }

    /* KPIs */
    .kpis { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 14px; }

    .kpi-card {
      background: var(--surface);
      border-radius: var(--r);
      padding: 16px 18px;
      box-shadow: var(--shadow);
      border-top: 3px solid transparent;
      transition: transform 0.12s, box-shadow 0.12s;
    }

    .kpi-card[data-filter] { cursor: pointer; }
    .kpi-card[data-filter]:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
    .kpi-card.kpi-active { outline: 2px solid #1c1c1e; outline-offset: 2px; }

    .kpi-card[data-kpi="atRisk"]     { border-top-color: var(--risk-accent); }
    .kpi-card[data-kpi="onTrack"]    { border-top-color: var(--track-accent); }
    .kpi-card[data-kpi="blindSpots"] { border-top-color: var(--unk-accent); }

    .kpi-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 8px; }
    .kpi-value { font-size: 44px; font-weight: 800; line-height: 1; letter-spacing: -0.03em; }

    .kpi-card[data-kpi="atRisk"]     .kpi-value { color: var(--risk-accent); }
    .kpi-card[data-kpi="onTrack"]    .kpi-value { color: var(--track-accent); }
    .kpi-card[data-kpi="blindSpots"] .kpi-value { color: var(--unk-accent); }

    /* Controls */
    .controls {
      background: var(--surface);
      border-radius: var(--r);
      padding: 12px 14px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search { flex: 1 1 200px; }

    .search input {
      width: 100%;
      padding: 9px 13px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-size: 16px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .search input:focus { border-color: #1c1c1e; }

    .filters { display: flex; gap: 6px; flex-wrap: wrap; }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      padding: 0 12px;
      height: 44px;
      border-radius: 9px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.12s;
    }

    .filter-btn:hover { border-color: #1c1c1e; color: var(--text); }
    .filter-btn.active { background: #1c1c1e; border-color: #1c1c1e; color: #fff; }
    .filter-count { font-size: 11px; font-weight: 400; opacity: 0.65; }

    /* Jobs */
    .jobs-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }

    .job-card {
      background: var(--surface);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      border-left: 5px solid transparent;
      display: flex;
      flex-direction: column;
    }

    .job-card.s-risk    { border-left-color: var(--risk-accent);    background: var(--risk-card-bg); }
    .job-card.s-monitor { border-left-color: var(--monitor-accent);  background: var(--monitor-card-bg); }
    .job-card.s-track   { border-left-color: var(--track-accent);    background: var(--track-card-bg); }
    .job-card.s-unknown { border-left-color: var(--unk-accent);      background: var(--unk-card-bg); }

    .card-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 12px; flex: 1; }

    .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }

    .job-name { font-size: 20px; font-weight: 700; line-height: 1.15; min-width: 0; }

    .status-badge {
      flex-shrink: 0;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .b-risk    { background: var(--risk-accent); }
    .b-monitor { background: var(--monitor-accent); }
    .b-track   { background: var(--track-accent); }
    .b-unknown { background: var(--unk-accent); }

    .field { display: flex; flex-direction: column; gap: 3px; }
    .field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
    .field-value { font-size: 14px; line-height: 1.5; color: var(--text); }

    .labour-pill {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .l-ok  { background: #eff6ff; color: #1d4ed8; }
    .l-low { background: #fff7ed; color: #c2410c; }
    .l-unk { background: #f3f4f6; color: #6b7280; }

    .next-action {
      margin-top: auto;
      background: rgba(0,0,0,0.05);
      border-radius: 9px;
      padding: 11px 13px;
    }

    .next-action .field-label { color: var(--text); }
    .next-action .field-value { font-weight: 600; }

    .empty {
      grid-column: 1/-1;
      background: var(--surface);
      border-radius: var(--r);
      padding: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      box-shadow: var(--shadow);
    }

    .footer { margin-top: 32px; text-align: center; font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }

    @media (max-width: 860px) {
      .kpis      { grid-template-columns: repeat(2,1fr); }
      .jobs-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .wrap       { padding: 12px 12px 40px; }
      .kpi-value  { font-size: 36px; }
      .controls   { flex-direction: column; }
      .filters    { width: 100%; }
      .filter-btn { flex: 1; justify-content: center; }
    }

    @media print {
      body, .wrap { background: #fff; }
      .controls   { display: none; }
      .header     { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .job-card   { break-inside: avoid; box-shadow: none; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .jobs-grid  { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header class="header">
    <div class="header-row">
      <h1 class="company-name" id="companyName"></h1>
      <div class="header-meta">
        <div class="meta-item">
          <div class="meta-label">Week Ending</div>
          <div class="meta-value" id="weekEnding"></div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Last Updated</div>
          <div class="meta-value" id="lastUpdated"></div>
        </div>
      </div>
    </div>
  </header>

  <div class="kpis">
    <div class="kpi-card" data-kpi="totalJobs">
      <div class="kpi-label">Total Jobs</div>
      <div class="kpi-value" id="kpiTotal"></div>
    </div>
    <div class="kpi-card" data-kpi="atRisk" data-filter="At Risk" tabindex="0" role="button">
      <div class="kpi-label">At Risk</div>
      <div class="kpi-value" id="kpiAtRisk"></div>
    </div>
    <div class="kpi-card" data-kpi="onTrack" data-filter="On Track" tabindex="0" role="button">
      <div class="kpi-label">On Track</div>
      <div class="kpi-value" id="kpiOnTrack"></div>
    </div>
    <div class="kpi-card" data-kpi="blindSpots" data-filter="Unknown" tabindex="0" role="button">
      <div class="kpi-label">Blind Spots</div>
      <div class="kpi-value" id="kpiBlindSpots"></div>
    </div>
  </div>

  <div class="controls">
    <div class="search">
      <input type="text" id="searchInput" placeholder="Search job name…" autocomplete="off" />
    </div>
    <div class="filters" id="filterBtns"></div>
  </div>

  <div id="jobsGrid" class="jobs-grid"></div>

  <footer class="footer">Produced by Thirty Petals &nbsp;·&nbsp; Confidential</footer>

</div>
<script>
  var data = {
    company: "K&K Industries",
    weekEnding: "1 April 2026",
    lastUpdated: "5 April 2026",
    jobs: [
      {
        name: "Caltex D'Aguilar",
        status: "At Risk",
        holdingUp: "Ace Demolition non-performance",
        labour: "Adequate",
        reality: "Key milestones achieved but demolition is holding job back.",
        nextAction: "Replace or manage contractor, resolve stockpile, confirm slab programme."
      },
      {
        name: "Pearl Energy Childers",
        status: "Monitor",
        holdingUp: "Concreting start post-Easter",
        labour: "Insufficient",
        reality: "Prep largely complete but fragile without labour increase.",
        nextAction: "Lock concreter, increase crew, confirm slab readiness."
      },
      {
        name: "EXUS Williamstown",
        status: "Unknown",
        holdingUp: "No structured logs",
        labour: "Adequate",
        reality: "Work progressing but programme position unclear.",
        nextAction: "Complete logs and confirm programme."
      },
      {
        name: "Pearl Energy Emerald",
        status: "Unknown",
        holdingUp: "No structured logs",
        labour: "Unknown",
        reality: "No usable weekly position from logs yet.",
        nextAction: "Improve daily logging and confirm programme."
      }
    ]
  };

  function esc(s) {
    return String(s || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  var STATUS = {
    "At Risk":  { card: "s-risk",    badge: "b-risk",    label: "At Risk" },
    "Monitor":  { card: "s-monitor", badge: "b-monitor", label: "Monitor" },
    "On Track": { card: "s-track",   badge: "b-track",   label: "On Track" },
    "Unknown":  { card: "s-unknown", badge: "b-unknown", label: "Unknown" }
  };

  var LABOUR = {
    "Adequate":     "l-ok",
    "Insufficient": "l-low",
    "Unknown":      "l-unk"
  };

  var FILTERS = ["All", "At Risk", "Monitor", "On Track", "Unknown"];
  var currentFilter = "All";

  function count(f) {
    if (f === "All") return data.jobs.length;
    return data.jobs.filter(function(j) { return j.status === f; }).length;
  }

  // Header
  document.getElementById("companyName").textContent = data.company;
  document.getElementById("weekEnding").textContent  = data.weekEnding;
  document.getElementById("lastUpdated").textContent = data.lastUpdated;

  // KPIs
  document.getElementById("kpiTotal").textContent     = data.jobs.length;
  document.getElementById("kpiAtRisk").textContent    = count("At Risk");
  document.getElementById("kpiOnTrack").textContent   = count("On Track");
  document.getElementById("kpiBlindSpots").textContent = count("Unknown");

  // Filters
  function renderFilters() {
    var c = document.getElementById("filterBtns");
    c.innerHTML = FILTERS.map(function(f) {
      return '<button class="filter-btn' + (currentFilter === f ? " active" : "") + '" data-f="' + esc(f) + '">' +
        esc(f) + ' <span class="filter-count">(' + count(f) + ')</span></button>';
    }).join("");
    c.querySelectorAll(".filter-btn").forEach(function(btn) {
      btn.addEventListener("click", function() {
        currentFilter = btn.getAttribute("data-f");
        renderFilters();
        renderJobs();
        syncKPI();
      });
    });
  }

  // KPI click
  document.querySelectorAll(".kpi-card[data-filter]").forEach(function(card) {
    card.addEventListener("click", function() {
      currentFilter = card.getAttribute("data-filter");
      renderFilters();
      renderJobs();
      syncKPI();
    });
    card.addEventListener("keydown", function(e) {
      if (e.key === "Enter" || e.key === " ") card.click();
    });
  });

  function syncKPI() {
    document.querySelectorAll(".kpi-card").forEach(function(card) {
      card.classList.toggle("kpi-active", card.getAttribute("data-filter") === currentFilter);
    });
  }

  // Jobs
  function renderJobs() {
    var grid   = document.getElementById("jobsGrid");
    var search = document.getElementById("searchInput").value.trim().toLowerCase();
    var jobs   = data.jobs.filter(function(j) {
      return j.name.toLowerCase().indexOf(search) !== -1 &&
             (currentFilter === "All" || j.status === currentFilter);
    });

    if (!jobs.length) {
      grid.innerHTML = '<div class="empty">No jobs match your filter or search.</div>';
      return;
    }

    grid.innerHTML = jobs.map(function(job) {
      var s = STATUS[job.status] || STATUS["Unknown"];
      var l = LABOUR[job.labour] || "l-unk";
      return '<div class="job-card ' + s.card + '">' +
        '<div class="card-body">' +
          '<div class="card-head">' +
            '<h2 class="job-name">' + esc(job.name) + '</h2>' +
            '<span class="status-badge ' + s.badge + '">' + esc(s.label) + '</span>' +
          '</div>' +
          '<div class="field"><div class="field-label">Holding Up</div><div class="field-value">' + esc(job.holdingUp) + '</div></div>' +
          '<div class="field"><div class="field-label">Labour</div><div class="field-value"><span class="labour-pill ' + l + '">' + esc(job.labour) + '</span></div></div>' +
          '<div class="field"><div class="field-label">Site Reality</div><div class="field-value">' + esc(job.reality) + '</div></div>' +
          '<div class="next-action"><div class="field-label">Next Action</div><div class="field-value">' + esc(job.nextAction) + '</div></div>' +
        '</div></div>';
    }).join("");
  }

  document.getElementById("searchInput").addEventListener("input", renderJobs);

  renderFilters();
  renderJobs();
</script>
</body>
</html>
