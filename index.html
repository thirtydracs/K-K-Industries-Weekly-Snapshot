<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K&K Industries — Weekly Snapshot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F5F4F0; --surface: #FFFFFF; --surface2: #F9F8F5;
      --border: #E2DFD8; --border2: #CCC8C0;
      --text-1: #1A1814; --text-2: #5C5850; --text-3: #9E9A92;
      --critical: #C8271E; --behind: #D4620A; --ontrack: #1A7A3C;
      --critical-bg: rgba(200,39,30,0.06); --behind-bg: rgba(212,98,10,0.06); --ontrack-bg: rgba(26,122,60,0.06);
      --critical-border: rgba(200,39,30,0.22); --behind-border: rgba(212,98,10,0.22); --ontrack-border: rgba(26,122,60,0.22);
      --accent: #1D4ED8;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text-1); font-family: 'Barlow', sans-serif; font-weight: 400; min-height: 100vh; overflow-x: hidden; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 48px 32px 80px; }

    /* HEADER */
    header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; gap: 24px; flex-wrap: wrap; animation: fadeUp 0.4s ease both; border-bottom: 2px solid var(--text-1); padding-bottom: 28px; }
    .brand h1 { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(28px, 5vw, 48px); font-weight: 800; letter-spacing: -0.01em; line-height: 1; color: var(--text-1); }
    .brand h1 .amp { color: var(--accent); }
    .brand h1 .light { font-weight: 300; color: var(--text-1); }
    .meta { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
    .meta-row { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-3); letter-spacing: 0.05em; }
    .meta-row strong { color: var(--text-2); font-weight: 500; }

    /* KPI STRIP */
    .kpi-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin-bottom: 36px; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; animation: fadeUp 0.4s 0.08s ease both; }
    .kpi { background: var(--surface); padding: 18px 20px; display: flex; flex-direction: column; gap: 4px; transition: background 0.15s; border-top: 3px solid var(--text-1); }
    .kpi:hover { background: var(--surface2); }
    .kpi.critical { border-top-color: var(--critical); }
    .kpi.behind   { border-top-color: var(--behind); }
    .kpi.ontrack  { border-top-color: var(--ontrack); }
    .kpi-value { font-family: 'Barlow Condensed', sans-serif; font-size: 38px; font-weight: 700; line-height: 1; color: var(--text-1); }
    .kpi-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-3); }
    .kpi.critical .kpi-value { color: var(--critical); }
    .kpi.behind   .kpi-value { color: var(--behind); }
    .kpi.ontrack  .kpi-value { color: var(--ontrack); }

    /* SECTION HEAD */
    .section-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .section-head h2 { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-3); white-space: nowrap; }
    .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ACCORDION */
    .selector-wrap { animation: fadeUp 0.4s 0.16s ease both; }
    .selector-list { display: flex; flex-direction: column; gap: 2px; }
    .selector-item { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; transition: border-color 0.15s, box-shadow 0.15s; }
    .selector-item:hover { border-color: var(--border2); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .selector-item.open  { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .selector-trigger { display: flex; align-items: center; gap: 14px; padding: 16px 20px; width: 100%; background: none; border: none; cursor: pointer; color: inherit; text-align: left; transition: background 0.15s; }
    .selector-trigger:hover { background: var(--surface2); }
    .status-bar { width: 3px; height: 32px; border-radius: 2px; flex-shrink: 0; }
    .critical-bar { background: var(--critical); }
    .behind-bar   { background: var(--behind); }
    .ontrack-bar  { background: var(--ontrack); }
    .trigger-info { flex: 1; }
    .trigger-sub { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); margin-bottom: 3px; }
    .trigger-name { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: var(--text-1); line-height: 1; }
    .trigger-right { display: flex; align-items: center; gap: 12px; }
    .status-pill { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; padding: 4px 9px; border-radius: 2px; white-space: nowrap; }
    .status-pill.critical { background: var(--critical-bg); color: var(--critical); border: 1px solid var(--critical-border); }
    .status-pill.behind   { background: var(--behind-bg);   color: var(--behind);   border: 1px solid var(--behind-border); }
    .status-pill.ontrack  { background: var(--ontrack-bg);  color: var(--ontrack);  border: 1px solid var(--ontrack-border); }
    .chevron { width: 18px; height: 18px; color: var(--text-3); transition: transform 0.25s ease; flex-shrink: 0; }
    .selector-item.open .chevron { transform: rotate(180deg); }
    .panel { max-height: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1); }
    .selector-item.open .panel { max-height: 600px; }
    .panel-inner { border-top: 1px solid var(--border); background: var(--surface2); padding: 20px; display: flex; flex-direction: column; gap: 14px; align-items: stretch; }
    .blocker-row { border-radius: 3px; padding: 11px 14px; display: flex; gap: 10px; align-items: flex-start; }
    .blocker-row.critical { background: var(--critical-bg); border: 1px solid var(--critical-border); }
    .blocker-row.behind   { background: var(--behind-bg);   border: 1px solid var(--behind-border); }
    .blocker-row.ontrack  { background: var(--ontrack-bg);  border: 1px solid var(--ontrack-border); }
    .blocker-icon { font-family: 'IBM Plex Mono', monospace; font-size: 11px; margin-top: 1px; flex-shrink: 0; }
    .blocker-icon.critical { color: var(--critical); }
    .blocker-icon.behind   { color: var(--behind); }
    .blocker-icon.ontrack  { color: var(--ontrack); }
    .blocker-text { font-size: 13.5px; color: var(--text-2); line-height: 1.5; }
    .info-grid { display: grid; grid-template-columns: 130px 1fr; gap: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 16px; }
    .info-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-3); padding-top: 2px; }
    .info-value { font-size: 13.5px; color: var(--text-2); line-height: 1.5; }
    .action-chip { display: inline-flex; align-items: center; gap: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.08em; color: var(--accent); border: 1px solid rgba(29,78,216,0.22); background: rgba(29,78,216,0.05); border-radius: 3px; padding: 9px 14px; align-self: flex-start; }
    .action-chip::before { content: '→'; flex-shrink: 0; }

    /* RISK TABLE */
    .risk-table { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .risk-table table { width: 100%; border-collapse: collapse; }
    .risk-table thead tr { background: var(--text-1); }
    .risk-table th { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.6); padding: 12px 16px; text-align: left; }
    .risk-table td { font-size: 13px; color: var(--text-2); padding: 12px 16px; vertical-align: top; border-bottom: 1px solid var(--border); line-height: 1.5; }
    .risk-table tr:last-child td { border-bottom: none; }
    .risk-table tr:hover td { background: var(--surface2); }
    .risk-table td:first-child { font-weight: 500; color: var(--text-1); white-space: nowrap; }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 8px; }
    .dot.critical { background: var(--critical); }
    .dot.behind   { background: var(--behind); }
    .dot.ontrack  { background: var(--ontrack); }

    /* FOOTER */
    footer { margin-top: 56px; padding-top: 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
    footer span { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-3); letter-spacing: 0.08em; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 640px) {
      .wrap { padding: 28px 16px 60px; }
      .kpi-strip { grid-template-columns: repeat(2, 1fr); }
      .meta { align-items: flex-start; }
      header { flex-direction: column; }
      .info-grid { grid-template-columns: 100px 1fr; }
      .risk-table { overflow-x: auto; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1>K<span class="amp">&amp;</span>K Industries — <span class="light">Weekly Snapshot</span></h1>
    </div>
    <div class="meta">
      <div class="meta-row">Period ending <strong id="periodEnding"></strong></div>
    </div>
  </header>

  <div class="kpi-strip" id="kpiStrip"></div>

  <div class="section-head"><h2>Project Snapshots</h2></div>
  <div class="selector-wrap">
    <div class="selector-list" id="projectList"></div>
  </div>

  <div style="margin-top: 44px;">
    <div class="section-head"><h2>Key Risks &amp; Actions</h2></div>
    <div class="risk-table">
      <table>
        <thead><tr><th>Project</th><th>Risk</th><th>Required Action</th><th>Priority</th></tr></thead>
        <tbody id="riskTableBody"></tbody>
      </table>
    </div>
  </div>

  <footer>
    <span>K&amp;K Industries · Weekly Snapshot</span>
    <span id="footerDate"></span>
  </footer>
</div>

<!-- Load weekly data -->
<script src="data.js"></script>

<script>
  // ── HELPERS ──────────────────────────────────────────────────────
  function mapStatus(s) {
    if (!s) return 'ontrack';
    const v = s.toLowerCase();
    if (v.includes('critical')) return 'critical';
    if (v === 'behind' || v.includes('slightly')) return 'behind';
    return 'ontrack';
  }

  function cssClass(s)  { return s === 'critical' ? 'critical' : s === 'behind' ? 'behind' : 'ontrack'; }
  function barClass(s)  { return cssClass(s) + '-bar'; }
  function iconChar(s)  { return s === 'critical' ? '!' : s === 'behind' ? '▲' : '✓'; }
  function priority(s)  { return s === 'critical' ? 'Critical' : s === 'behind' ? 'Urgent' : 'Monitor'; }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function slugify(str) {
    return (str || '').toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
  }

  function toggle(id) {
    document.querySelectorAll('.selector-item').forEach(item => {
      if (item.dataset.id === id) item.classList.toggle('open');
      else item.classList.remove('open');
    });
  }

  // ── RENDER ───────────────────────────────────────────────────────
  function render() {
    if (typeof weeklyData === 'undefined' || !weeklyData.length) {
      document.getElementById('projectList').innerHTML = '<p style="padding:20px;color:var(--text-3);font-family:IBM Plex Mono,monospace;font-size:12px;">No data loaded. Check data.js is in the same folder.</p>';
      return;
    }

    // Map statuses
    const jobs = weeklyData.map(j => ({
      ...j,
      _status: mapStatus(j.status)
    }));

    // Header date
    const dateStr = weeklyData[0]?.weekEnding || '';
    document.getElementById('periodEnding').textContent = dateStr;
    document.getElementById('footerDate').textContent = dateStr ? 'Period ending ' + dateStr : '';

    // KPI strip
    const total    = jobs.length;
    const critical = jobs.filter(j => j._status === 'critical').length;
    const behind   = jobs.filter(j => j._status === 'behind').length;
    const ontrack  = jobs.filter(j => j._status === 'ontrack').length;

    document.getElementById('kpiStrip').innerHTML = `
      <div class="kpi"><span class="kpi-value">${total}</span><span class="kpi-label">Jobs Active</span></div>
      <div class="kpi critical"><span class="kpi-value">${critical}</span><span class="kpi-label">Critical</span></div>
      <div class="kpi behind"><span class="kpi-value">${behind}</span><span class="kpi-label">Behind</span></div>
      <div class="kpi ontrack"><span class="kpi-value">${ontrack}</span><span class="kpi-label">On Track</span></div>
    `;

    // Project accordion cards
    document.getElementById('projectList').innerHTML = jobs.map(j => {
      const s   = j._status;
      const css = cssClass(s);
      const id  = slugify(j.project);
      return `
        <div class="selector-item" data-id="${id}">
          <button class="selector-trigger" onclick="toggle('${id}')">
            <div class="status-bar ${barClass(s)}"></div>
            <div class="trigger-info">
              <div class="trigger-sub">${esc(j.project)}</div>
              <div class="trigger-name">${esc(j.status)}</div>
            </div>
            <div class="trigger-right">
              <span class="status-pill ${css}">${esc(j.status)}</span>
              <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </button>
          <div class="panel">
            <div class="panel-inner">
              <div class="blocker-row ${css}">
                <span class="blocker-icon ${css}">${iconChar(s)}</span>
                <span class="blocker-text">${esc(j.holding)}</span>
              </div>
              <div class="info-grid">
                <span class="info-label">Position</span><span class="info-value">${esc(j.reality)}</span>
                <span class="info-label">Labour</span><span class="info-value">${esc(j.labour)}</span>
              </div>
              <span class="action-chip">${esc(j.next)}</span>
            </div>
          </div>
        </div>`;
    }).join('\n');

    // Risk table
    document.getElementById('riskTableBody').innerHTML = jobs.map(j => {
      const s   = j._status;
      const css = cssClass(s);
      return `
        <tr>
          <td><span class="dot ${css}"></span>${esc(j.project)}</td>
          <td>${esc(j.holding)}</td>
          <td>${esc(j.next)}</td>
          <td><span class="status-pill ${css}">${priority(s)}</span></td>
        </tr>`;
    }).join('\n');
  }

  render();
</script>
</body>
</html>

  render();
</script>
</body>
</html>
