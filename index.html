<!DOCTYPE html>
<html>
<head>
  <title>Weekly Builder Snapshot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    .wrap {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: #fff;
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .status {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .red { color: #d32f2f; }
    .green { color: #2e7d32; }
    .grey { color: #555; }
  </style>

</head>

<body>

<div class="wrap">
  <h1>Weekly Builder Snapshot</h1>
  <div id="jobs"></div>
</div>

<script src="data/weekly.js"></script>

<script>
  const container = document.getElementById("jobs");

  jobs.forEach(job => {
    const card = document.createElement("div");
    card.className = "card";

    let statusClass = "grey";
    if (job.status.includes("Behind")) statusClass = "red";
    else if (job.status.includes("Track")) statusClass = "green";

    card.innerHTML = `
      <div class="title">${job.name}</div>
      <div class="status ${statusClass}">Status: ${job.status}</div>
      <p><strong>Holding Up:</strong> ${job.holding}</p>
      <p><strong>Labour:</strong> ${job.labour}</p>
      <p><strong>Reality:</strong> ${job.reality}</p>
      <p><strong>Next Action:</strong> ${job.action}</p>
    `;

    container.appendChild(card);
  });
</script>

</body>
</html>
