<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K&K Industries — Weekly Site Snapshots</title>

  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    body { font-family: 'Barlow', sans-serif; background:#F5F4F0; margin:0; }
    .wrap { max-width:900px; margin:auto; padding:40px 20px; }

    header { border-bottom:2px solid #111; margin-bottom:30px; }
    h1 { font-family:'Barlow Condensed'; font-size:40px; margin:0; }
    .amp { color:#1D4ED8; }
    .light { font-weight:300; }

    .kpi-strip { display:grid; grid-template-columns:repeat(5,1fr); gap:4px; margin:20px 0; }
    .kpi { background:#fff; padding:15px; border:1px solid #ddd; }
    .kpi-value { font-size:28px; font-weight:bold; }

    .selector-item { border:1px solid #ddd; margin-bottom:8px; background:#fff; }
    .selector-trigger { padding:15px; display:flex; justify-content:space-between; cursor:pointer; }

    .status-pill { font-size:12px; padding:4px 8px; border-radius:4px; }
    .critical { color:#C8271E; }
    .behind { color:#D4620A; }
    .ontrack { color:#1A7A3C; }

    .panel { display:none; padding:15px; background:#fafafa; }
    .selector-item.open .panel { display:block; }

    .blocker { margin-bottom:10px; }
    .action { margin-bottom:5px; }
  </style>
</head>

<body>
<div class="wrap">

<header>
  <h1>K<span class="amp">&amp;</span>K Industries — <span class="light">Weekly Site Snapshots</span></h1>
  <div>Period ending <strong id="periodEnding"></strong></div>
</header>

<div class="kpi-strip" id="kpiStrip"></div>

<div id="projectList"></div>

</div>

<script src="data/weekly.js"></script>
<script>

function mapStatus(s){
  if(!s) return 'ontrack';
  s=s.toLowerCase();
  if(s.includes('critical')) return 'critical';
  if(s.includes('behind')) return 'behind';
  return 'ontrack';
}

function render(){

  const jobs = weeklyData;

  document.getElementById('periodEnding').innerText = jobs[0].weekEnding;

  const total = jobs.length;
  const critical = jobs.filter(j=>mapStatus(j.status)==='critical').length;
  const behind = jobs.filter(j=>mapStatus(j.status)==='behind').length;
  const ontrack = jobs.filter(j=>mapStatus(j.status)==='ontrack').length;

  document.getElementById('kpiStrip').innerHTML = `
    <div class="kpi"><div class="kpi-value">${total}</div>Jobs</div>
    <div class="kpi"><div class="kpi-value">${critical}</div>Critical</div>
    <div class="kpi"><div class="kpi-value">${behind}</div>Behind</div>
    <div class="kpi"><div class="kpi-value">${ontrack}</div>On Track</div>
  `;

  document.getElementById('projectList').innerHTML = jobs.map((j,i)=>{

    const status = mapStatus(j.status);

    return `
      <div class="selector-item">
        <div class="selector-trigger" onclick="toggle(${i})">
          <div>${j.project}</div>
          <div class="status-pill ${status}">${j.status}</div>
        </div>

        <div class="panel">
          <div class="blocker"><strong>Holding:</strong> ${j.holding}</div>
          <div><strong>Reality:</strong> ${j.reality}</div>
          <div><strong>Labour:</strong> ${j.labour}</div>

          <div style="margin-top:10px;">
            <strong>Next:</strong>
            ${j.next.map(n=>`<div class="action">→ ${n}</div>`).join('')}
          </div>
        </div>
      </div>
    `;
  }).join('');

}

function toggle(i){
  document.querySelectorAll('.selector-item')[i].classList.toggle('open');
}

render();

</script>
</body>
</html>
